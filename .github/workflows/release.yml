# Builds the plugin on a version tag (e.g. v1.0.0.0) and publishes latest.zip to a GitHub Release.
name: Release Gachapon Machine

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2022

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Install .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Download Dalamud
      run: |
        Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile dalamud.zip
        Expand-Archive -Force dalamud.zip "$env:AppData\XIVLauncher\addon\Hooks\dev"

    - name: Build (Release)
      run: dotnet build --configuration Release

    - name: Package plugin as latest.zip
      shell: pwsh
      run: |
        $zip = Get-ChildItem -Path .\GachaPlugin\bin -Recurse -Filter latest.zip -ErrorAction SilentlyContinue | Select-Object -First 1
        if (-not $zip) {
          Write-Host "::error::latest.zip not found under .\GachaPlugin\bin"
          Get-ChildItem -Path .\GachaPlugin\bin -Recurse -ErrorAction SilentlyContinue | Select-Object FullName | Out-String | Write-Host
          exit 1
        }
        Write-Host "Found plugin package: $($zip.FullName)"
        New-Item -ItemType Directory -Force -Path dist | Out-Null
        Copy-Item $zip.FullName -Destination dist\latest.zip -Force

    - name: Create / update GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/latest.zip
        fail_on_unmatched_files: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
